events {}

http {
    # Single public entrypoint on the VPS IP (port 80). Add a TLS server block
    # later once a domain + certificate are available.
    server {
        listen 80;
        server_name _;

        # API + health → FastAPI backend (internal only).
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api:8000/health;
        }

        location /docs {
            proxy_pass http://api:8000/docs;
        }

        location /openapi.json {
            proxy_pass http://api:8000/openapi.json;
        }

        # Everything else → Next.js dashboard (internal only).
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
