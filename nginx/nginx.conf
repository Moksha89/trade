events {}

http {
    # Use Docker's embedded DNS so upstream container IPs are re-resolved at
    # runtime. Without this, nginx caches the IP at startup and returns 502
    # after a backend container is recreated (e.g. `docker compose up --build`).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Single public entrypoint on the VPS IP (port 80). Add a TLS server block
    # later once a domain + certificate are available.
    server {
        listen 80;
        server_name _;

        # API + health → FastAPI backend (internal only).
        location /api/ {
            set $api_upstream api;
            proxy_pass http://$api_upstream:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            set $api_upstream api;
            proxy_pass http://$api_upstream:8000/health;
        }

        location /docs {
            set $api_upstream api;
            proxy_pass http://$api_upstream:8000/docs;
        }

        location = /openapi.json {
            set $api_upstream api;
            proxy_pass http://$api_upstream:8000/openapi.json;
        }

        # Everything else → Next.js dashboard (internal only).
        location / {
            set $fe_upstream frontend;
            proxy_pass http://$fe_upstream:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
